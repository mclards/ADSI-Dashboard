<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0f1117;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 16px;
        overflow: auto;
        font-family: "Segoe UI", sans-serif;
        color: #e2e8f0;
      }
      .wrap {
        text-align: center;
        max-width: 480px;
        width: 100%;
        padding: 16px;
        border-radius: 8px;
        background: rgba(23, 13, 18, 0.5);
        max-height: calc(100vh - 32px);
        overflow: auto;
      }
      .icon {
        width: 48px;
        height: 48px;
        object-fit: contain;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 8px rgba(245, 197, 24, 0.35));
      }
      .title {
        font-size: 22px;
        font-weight: 700;
        color: #f5c518;
        letter-spacing: 1px;
      }
      .sub {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 4px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        margin: 16px auto 0;
        border: 3px solid #2e3350;
        border-top-color: #f5c518;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .steps {
        margin-top: 16px;
        padding: 12px 8px;
        font-size: 9px;
        text-align: left;
        opacity: 0.7;
        background: rgba(46, 51, 80, 0.3);
        border-radius: 4px;
        line-height: 1.3;
      }
      .step {
        padding: 2px 0;
        color: #94a3b8;
      }
      .step.active {
        color: #f5c518;
        font-weight: 600;
      }
      .step.done {
        color: #10b370;
      }
      .step.done::before {
        content: "✓ ";
      }
      .error-panel {
        display: none;
        margin-top: 16px;
        padding: 10px;
        background-color: rgba(224, 53, 96, 0.12);
        border: 1px solid var(--red, #e03560);
        border-radius: 6px;
        color: #ffc0cb;
        font-size: 10px;
        line-height: 1.4;
      }
      .error-title {
        font-weight: 700;
        color: #e03560;
        margin-bottom: 4px;
      }
      .retry-btn {
        margin-top: 8px;
        padding: 5px 10px;
        background-color: #c05b7c;
        border: none;
        border-radius: 4px;
        color: #fff;
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .retry-btn:hover {
        opacity: 0.84;
      }
      .retry-btn:active {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="icon" src="../assets/logo.png" alt="Inverter Dashboard" />
      <div class="title">Inverter Dashboard</div>
      <div class="sub" id="statusText">Starting server, please wait…</div>
      <div class="spinner" id="spinner"></div>

      <div class="steps">
        <div class="step active" id="step1">Starting server…</div>
        <div class="step" id="step2">Validating license…</div>
        <div class="step" id="step3">Loading configuration…</div>
        <div class="step" id="step4">Initializing services…</div>
      </div>

      <div class="error-panel" id="errorPanel">
        <div class="error-title">Startup Failed</div>
        <div id="errorMsg">Check that backend services are running.</div>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
      </div>
    </div>

    <script>
      const STARTUP_TIMEOUT = 30000;  // 30 seconds
      let startTime = Date.now();
      let currentStep = 1;

      function updateStep(stepNum, isDone) {
        const el = document.getElementById(`step${stepNum}`);
        if (el) {
          el.classList.remove("active");
          if (isDone) {
            el.classList.add("done");
          } else {
            el.classList.add("active");
          }
        }
      }

      function showError(message) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("statusText").textContent = "Startup failed";
        document.getElementById("errorMsg").textContent = message;
        document.getElementById("errorPanel").style.display = "block";
      }

      function checkServerReady() {
        const elapsed = Date.now() - startTime;

        // Update progress steps based on elapsed time
        if (elapsed > 2000 && currentStep === 1) {
          updateStep(1, true);
          updateStep(2, false);
          currentStep = 2;
        }
        if (elapsed > 8000 && currentStep === 2) {
          updateStep(2, true);
          updateStep(3, false);
          currentStep = 3;
        }
        if (elapsed > 15000 && currentStep === 3) {
          updateStep(3, true);
          updateStep(4, false);
          currentStep = 4;
        }

        // Timeout check
        if (elapsed > STARTUP_TIMEOUT) {
          showError(
            "Server startup timeout (30s). Check that backend services and configuration are correct. Ensure InverterCoreService.exe and ForecastCoreService.exe can be found."
          );
          return;
        }

        // Check if main page is accessible
        fetch("/", { method: "HEAD" })
          .then((r) => {
            if (r.ok) {
              window.location.href = "/";
            } else {
              setTimeout(checkServerReady, 500);
            }
          })
          .catch(() => {
            setTimeout(checkServerReady, 500);
          });
      }

      // Start checking after a brief delay
      setTimeout(checkServerReady, 100);
    </script>
  </body>
</html>
