<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADSI Inverter Dashboard Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("adsi_theme") === "light" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <style>
      :root {
        --bg: #050c17;
        --bg2: #080f1c;
        --surface: #0c1526;
        --surface2: #0f1d32;
        --border: #182a48;
        --border2: #243d66;
        --text: #dce8fa;
        --text2: #8aa3cc;
        --text3: #526a92;
        --accent: #2d7ef7;
        --accent2: #1a60d0;
        --green: #10b370;
        --red: #e03560;
      }

      :root[data-theme="light"] {
        --bg: #e8dfcf;
        --bg2: #ded4c2;
        --surface: #f1e8d8;
        --surface2: #ebe1d0;
        --border: #b9ab96;
        --border2: #a8967f;
        --text: #2f271a;
        --text2: #524533;
        --text3: #7b6a54;
        --accent: #2b67ad;
        --accent2: #1f4f89;
        --green: #0f8f5b;
        --red: #ba3555;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Sora", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      /* ── Background texture ──────────────────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(45, 126, 247, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(45, 126, 247, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      :root[data-theme="light"] body::before {
        background-image:
          linear-gradient(rgba(126, 106, 78, 0.14) 1px, transparent 1px),
          linear-gradient(90deg, rgba(126, 106, 78, 0.14) 1px, transparent 1px);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 60% 40% at 15% -10%, rgba(45, 126, 247, 0.1) 0%, transparent 60%),
          radial-gradient(ellipse 50% 35% at 90% -5%, rgba(16, 179, 112, 0.06) 0%, transparent 55%);
      }

      :root[data-theme="light"] body::after {
        background:
          radial-gradient(ellipse 60% 40% at 15% -10%, rgba(178, 144, 86, 0.18) 0%, transparent 60%),
          radial-gradient(ellipse 50% 35% at 90% -5%, rgba(138, 118, 87, 0.11) 0%, transparent 55%);
      }

      /* ── Login card ──────────────────────────────────────────────────────── */
      .login-shell {
        position: relative;
        z-index: 1;
        width: min(92vw, 400px);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px 36px 18px;
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--accent) 5%, transparent) 0%, transparent 40%),
          linear-gradient(160deg, var(--surface) 0%, var(--bg2) 100%);
        box-shadow:
          0 20px 48px rgba(0, 0, 0, 0.44),
          0 2px 8px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(148, 179, 230, 0.1);
        overflow: hidden;
      }

      .login-shell::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 2px;
        background: linear-gradient(90deg, transparent 5%, var(--accent) 50%, transparent 95%);
        opacity: 0.5;
        pointer-events: none;
      }

      :root[data-theme="light"] .login-shell {
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 40%),
          linear-gradient(160deg, #f3ebdd 0%, #e8ddca 100%);
        box-shadow:
          0 16px 36px rgba(77, 64, 43, 0.18),
          0 2px 6px rgba(77, 64, 43, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      /* ── Brand ───────────────────────────────────────────────────────────── */
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-bottom: 2px;
      }

      .brand-logo {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .brand-logo::before {
        content: "";
        position: absolute;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent) 18%, transparent) 0%, transparent 70%);
        pointer-events: none;
      }

      .brand img {
        position: relative;
        width: 52px;
        height: 52px;
        object-fit: contain;
        filter: drop-shadow(0 2px 8px rgba(45, 126, 247, 0.2));
      }

      .brand-text {
        text-align: center;
      }

      .brand-text h1 {
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 1.2px;
        color: var(--text);
        text-transform: uppercase;
      }

      .brand-text p {
        margin-top: 3px;
        font-size: 10.5px;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      /* ── Divider ─────────────────────────────────────────────────────────── */
      .login-divider {
        width: 48px;
        height: 1px;
        margin: 14px auto;
        background: linear-gradient(90deg, transparent, var(--border2), transparent);
      }

      /* ── Section title ───────────────────────────────────────────────────── */
      .section-title {
        margin: 0 0 14px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: var(--text);
        text-align: center;
      }

      /* ── Inputs ──────────────────────────────────────────────────────────── */
      .field {
        position: relative;
        margin-top: 12px;
      }

      .field:first-of-type {
        margin-top: 0;
      }

      .inp {
        width: 100%;
        height: 42px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: color-mix(in srgb, var(--bg) 80%, var(--surface));
        color: var(--text);
        font-family: "Sora", "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 0 14px;
        text-align: center;
        outline: none;
        transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
      }

      .inp::placeholder {
        color: var(--text3);
        font-weight: 400;
      }

      .inp:hover {
        border-color: var(--border2);
        background: color-mix(in srgb, var(--bg) 60%, var(--surface));
      }

      .inp:focus {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--bg) 60%, var(--surface));
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
      }

      :root[data-theme="light"] .inp {
        background: rgba(249, 242, 229, 0.98);
        color: #2e2418;
        border-color: #c0ae94;
      }

      :root[data-theme="light"] .inp:hover {
        border-color: #a89575;
        background: rgba(255, 249, 238, 0.99);
      }

      :root[data-theme="light"] .inp:focus {
        border-color: #2b67ad;
        box-shadow: 0 0 0 3px rgba(43, 103, 173, 0.14);
      }

      /* ── Remember checkbox ───────────────────────────────────────────────── */
      .remember {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
        font-size: 11.5px;
        font-weight: 500;
        color: var(--text2);
        user-select: none;
        cursor: pointer;
      }

      .remember input {
        width: 15px;
        height: 15px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      /* ── Buttons ─────────────────────────────────────────────────────────── */
      .btn {
        width: 100%;
        height: 42px;
        border: 1px solid transparent;
        border-radius: 10px;
        font-family: "Sora", "Segoe UI", sans-serif;
        font-size: 13.5px;
        font-weight: 700;
        letter-spacing: 0.3px;
        cursor: pointer;
        transition: filter 0.14s, transform 0.1s, box-shadow 0.18s;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-primary {
        color: #fff;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 30%, transparent);
      }

      #loginBtn {
        margin-top: 12px;
      }

      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 36%, transparent);
      }

      /* ── Links ───────────────────────────────────────────────────────────── */
      .links {
        margin-top: 14px;
        text-align: center;
        font-size: 11.5px;
        line-height: 1.8;
        color: var(--text3);
      }

      .links a {
        color: var(--text2);
        text-decoration: none;
        cursor: pointer;
        transition: color 0.14s;
      }

      .links a:hover {
        color: var(--accent);
      }

      .links .sep {
        display: inline-block;
        width: 3px;
        height: 3px;
        margin: 0 6px;
        border-radius: 50%;
        background: var(--text3);
        vertical-align: middle;
        opacity: 0.6;
      }

      :root[data-theme="light"] .links a {
        color: #5b4a35;
      }

      :root[data-theme="light"] .links a:hover {
        color: #2b67ad;
      }

      /* ── Footer ──────────────────────────────────────────────────────────── */
      .footer {
        margin-top: 14px;
        text-align: center;
        font-size: 10px;
        font-weight: 500;
        color: var(--text3);
        letter-spacing: 0.3px;
        opacity: 0.7;
      }

      /* ── Modal overlay ───────────────────────────────────────────────────── */
      #modal-bg,
      #reset-bg {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        padding: 14px;
        background: rgba(2, 8, 16, 0.82);
        backdrop-filter: blur(6px);
        justify-content: center;
        align-items: center;
      }

      :root[data-theme="light"] #modal-bg,
      :root[data-theme="light"] #reset-bg {
        background: rgba(180, 168, 148, 0.6);
      }

      .modal {
        width: min(92vw, 380px);
        border: 1px solid var(--border2);
        border-radius: 16px;
        padding: 24px 28px;
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--accent) 4%, transparent) 0%, transparent 30%),
          linear-gradient(160deg, var(--surface) 0%, var(--bg2) 100%);
        box-shadow:
          0 20px 44px rgba(0, 0, 0, 0.48),
          inset 0 1px 0 rgba(148, 179, 230, 0.09);
      }

      :root[data-theme="light"] .modal {
        background: linear-gradient(160deg, #f3ebdd 0%, #e8ddca 100%);
        border-color: #b09a7a;
        box-shadow: 0 16px 36px rgba(77, 64, 43, 0.22);
      }

      .modal h3 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 16px;
        color: var(--text);
        letter-spacing: 0.2px;
        text-align: center;
      }

      .modal .field {
        margin-top: 10px;
      }

      .modal .field:first-of-type {
        margin-top: 0;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      .modal-actions .btn {
        flex: 1;
        margin-top: 0;
        height: 38px;
        font-size: 12.5px;
      }

      .btn-outline {
        background: transparent;
        border-color: var(--border2);
        color: var(--text2);
      }

      .btn-outline:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      /* ── Toast message ───────────────────────────────────────────────────── */
      .msg {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.2px;
        z-index: 100;
        display: none;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }

      .msg.success {
        background: linear-gradient(135deg, #0c9e62, #10b370);
        color: #fff;
      }

      .msg.error {
        background: linear-gradient(135deg, #c32e52, #e03560);
        color: #fff;
      }

      /* ── Modal open blur ─────────────────────────────────────────────────── */
      body.modal-open .login-shell {
        filter: blur(2px) saturate(0.8);
        transform: scale(0.988);
        transition: filter 0.18s ease, transform 0.18s ease;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <div class="brand">
        <div class="brand-logo">
          <img src="../assets/logo.png" alt="ADSI Inverter Dashboard" />
        </div>
        <div class="brand-text">
          <h1>ADSI Inverter Dashboard</h1>
          <p>Authorized Access</p>
        </div>
      </div>

      <div class="login-divider"></div>

      <div class="section-title">Sign In</div>
      <div class="field">
        <input id="username" class="inp" type="text" placeholder="Username" autofocus />
      </div>
      <div class="field">
        <input id="password" class="inp" type="password" placeholder="Password" />
      </div>
      <label class="remember"><input type="checkbox" id="rememberMe" /> Remember credentials on this workstation</label>
      <button id="loginBtn" class="btn btn-primary">Sign In</button>

      <div class="links">
        <a id="changeUserPass">Update Username and Password</a>
        <span class="sep"></span>
        <a id="resetPass">Recover with Authorization Key</a>
      </div>

      <div class="footer">ADSI Inverter Dashboard &middot; Authorized Workstation Access</div>
    </main>

    <div id="modal-bg">
      <div class="modal">
        <h3>Update Username and Password</h3>
        <div class="field">
          <input id="authKey" class="inp" type="password" placeholder="Authorization Key" />
        </div>
        <div class="field">
          <input id="newUsername" class="inp" type="text" placeholder="New Username" />
        </div>
        <div class="field">
          <input id="newPassword" class="inp" type="password" placeholder="New Password" />
        </div>
        <div class="modal-actions">
          <button id="saveChange" class="btn btn-primary">Save Changes</button>
          <button id="cancelChange" class="btn btn-outline">Cancel</button>
        </div>
      </div>
    </div>

    <div id="reset-bg">
      <div class="modal">
        <h3>Restore Default Administrator Access</h3>
        <div class="field">
          <input id="resetAuthKey" class="inp" type="password" placeholder="Authorization Key" />
        </div>
        <div class="modal-actions">
          <button id="resetSave" class="btn btn-primary">Restore Access</button>
          <button id="resetCancel" class="btn btn-outline">Cancel</button>
        </div>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        const msg = document.getElementById("msg");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const rememberCheck = document.getElementById("rememberMe");
        const modalBg = document.getElementById("modal-bg");
        const resetBg = document.getElementById("reset-bg");
        const api = window.loginAPI;

        function showMsg(text, type = "success") {
          msg.textContent = text;
          msg.className = `msg ${type}`;
          msg.style.display = "block";
          setTimeout(() => {
            msg.style.display = "none";
          }, 2500);
        }

        function resetLoginForm() {
          usernameInput.value = "";
          passwordInput.value = "";
          rememberCheck.checked = false;
          usernameInput.focus();
        }

        function openLayer(layer) {
          if (!layer) return;
          layer.style.display = "flex";
          document.body.classList.add("modal-open");
        }

        function closeLayer(layer) {
          if (!layer) return;
          layer.style.display = "none";
          const stillOpen = modalBg.style.display === "flex" || resetBg.style.display === "flex";
          if (!stillOpen) document.body.classList.remove("modal-open");
        }

        try {
          const remembered = await api.getRemembered();
          if (remembered?.remember) {
            usernameInput.value = remembered.username || "";
            passwordInput.value = remembered.password || "";
            rememberCheck.checked = true;
          }
        } catch (_) {}

        async function doLogin() {
          const user = usernameInput.value.trim();
          const pass = passwordInput.value.trim();
          if (!user || !pass) return showMsg("Enter your username and password.", "error");

          const ok = await api.checkLogin(user, pass);
          if (!ok) return showMsg("The sign-in details are not valid.", "error");

          if (rememberCheck.checked) {
            await api.saveRemembered({ username: user, password: pass, remember: true });
          } else {
            await api.clearRemembered();
          }
          api.loginSuccess();
        }

        async function handleSaveChange() {
          const key = document.getElementById("authKey").value.trim();
          const newUser = document.getElementById("newUsername").value.trim();
          const newPass = document.getElementById("newPassword").value.trim();
          if (!key || !newUser || !newPass) return showMsg("Complete all required fields.", "error");

          const ok = await api.changeUsernamePassword(key, newUser, newPass);
          closeLayer(modalBg);
          if (ok) {
            await api.clearRemembered();
            showMsg("Sign-in credentials were updated.");
            resetLoginForm();
          } else {
            showMsg("The authorization key is not valid.", "error");
          }
        }

        async function handleResetSave() {
          const key = document.getElementById("resetAuthKey").value.trim();
          if (!key) return showMsg("Enter the authorization key.", "error");

          const ok = await api.resetPassword(key);
          closeLayer(resetBg);
          if (ok) {
            await api.clearRemembered();
            showMsg("Default administrator access has been restored. Update the credentials after sign-in.");
            resetLoginForm();
            return;
          }
          showMsg("The authorization key is not valid.", "error");
        }

        document.getElementById("loginBtn").addEventListener("click", doLogin);

        document.getElementById("changeUserPass").addEventListener("click", () => {
          openLayer(modalBg);
          modalBg.querySelectorAll("input").forEach((i) => {
            i.value = "";
          });
        });
        document.getElementById("cancelChange").addEventListener("click", () => {
          closeLayer(modalBg);
        });

        document.getElementById("saveChange").addEventListener("click", handleSaveChange);

        document.getElementById("resetPass").addEventListener("click", () => {
          openLayer(resetBg);
          resetBg.querySelectorAll("input").forEach((i) => {
            i.value = "";
          });
        });
        document.getElementById("resetCancel").addEventListener("click", () => {
          closeLayer(resetBg);
        });

        document.getElementById("resetSave").addEventListener("click", handleResetSave);

        [modalBg, resetBg].forEach((layer) => {
          layer.addEventListener("click", (e) => {
            if (e.target === layer) closeLayer(layer);
          });
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            if (modalBg.style.display === "flex") closeLayer(modalBg);
            else if (resetBg.style.display === "flex") closeLayer(resetBg);
            return;
          }

          if (e.key !== "Enter") return;
          if (modalBg.style.display === "flex") {
            e.preventDefault();
            handleSaveChange();
            return;
          }
          if (resetBg.style.display === "flex") {
            e.preventDefault();
            handleResetSave();
            return;
          }

          const active = document.activeElement;
          if (!active) return;
          const id = active.id || "";
          if (id === "username" || id === "password" || id === "loginBtn") {
            e.preventDefault();
            doLogin();
          }
        });
      });
    </script>
  </body>
</html>
