[pytest]
# Redirect pytest's scratch base directory into the repo-local, gitignored
# .tmp/ tree instead of the system temp dir.
#
# Why: package.json sets requireAdministrator, so an elevated app/test run can
# create C:\Users\<u>\AppData\Local\Temp\pytest-of-<u> with a SYSTEM+Admins-only
# ACL. A subsequent NON-elevated `npm run smoke` pytest then fails every
# tmp_path-fixture test with "PermissionError: [WinError 5] Access is denied"
# while merely scandir-ing that base dir. Pinning basetemp to a user-writable
# repo path decouples the suite from the global temp ACL entirely.
#
# .tmp/pytest is a dedicated subdir (pytest wipes basetemp each session), so it
# never collides with the other .tmp/* scratch dirs used by Node tests.
addopts = --basetemp=.tmp/pytest
